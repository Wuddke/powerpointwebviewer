<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Website Viewer</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #ffffff;
      border-bottom: 1px solid #d1d5db;
      flex-shrink: 0;
    }

    #urlInput {
      flex: 1;
      padding: 5px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    #urlInput:focus { border-color: #6366f1; }

    button {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #loadBtn {
      background: #6366f1;
      color: #fff;
    }
    #loadBtn:hover { background: #4f46e5; }

    /* ── Zoom controls ── */
    #zoomGroup {
      display: flex;
      align-items: center;
      gap: 4px;
      border-left: 1px solid #e5e7eb;
      padding-left: 10px;
      margin-left: 2px;
    }

    #zoomGroup label {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
    }

    #zoomSlider {
      width: 90px;
      accent-color: #6366f1;
      cursor: pointer;
    }

    #zoomDisplay {
      font-size: 12px;
      color: #374151;
      min-width: 36px;
      text-align: right;
    }

    #zoomReset {
      background: #e5e7eb;
      color: #374151;
      padding: 4px 8px;
      font-size: 12px;
    }
    #zoomReset:hover { background: #d1d5db; }

    /* ── iFrame wrapper ── */
    #frameWrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #fff;
    }

    #siteFrame {
      position: absolute;
      top: 0;
      left: 0;
      /* Width/height are set larger than 100% and then scaled down via transform
         so the content fills the wrapper at any zoom level. */
      transform-origin: top left;
      border: none;
    }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      gap: 8px;
      font-size: 14px;
      pointer-events: none;
    }
    #placeholder svg { opacity: 0.4; }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div id="toolbar">
    <input id="urlInput" type="url" placeholder="https://example.com" />
    <button id="loadBtn">Load</button>

    <!-- Zoom controls -->
    <div id="zoomGroup">
      <label for="zoomSlider">Zoom</label>
      <input id="zoomSlider" type="range" min="25" max="200" step="5" value="100" />
      <span id="zoomDisplay">100%</span>
      <button id="zoomReset" title="Reset zoom to 100%">↺</button>
    </div>
  </div>

  <!-- Website frame -->
  <div id="frameWrapper">
    <div id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      Enter a URL above and click Load
    </div>
    <iframe id="siteFrame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────
    const SETTING_URL  = "liveViewer_url";
    const SETTING_ZOOM = "liveViewer_zoom";
    const DEFAULT_ZOOM = 100;

    // ── Element refs ───────────────────────────────────────────
    const urlInput    = document.getElementById("urlInput");
    const loadBtn     = document.getElementById("loadBtn");
    const zoomSlider  = document.getElementById("zoomSlider");
    const zoomDisplay = document.getElementById("zoomDisplay");
    const zoomReset   = document.getElementById("zoomReset");
    const siteFrame   = document.getElementById("siteFrame");
    const frameWrapper= document.getElementById("frameWrapper");
    const placeholder = document.getElementById("placeholder");

    // ── Zoom logic ─────────────────────────────────────────────
    function applyZoom(pct) {
      const scale = pct / 100;
      // Make the iframe fill the wrapper at current zoom by inverting the scale
      const w = frameWrapper.offsetWidth  / scale;
      const h = frameWrapper.offsetHeight / scale;
      siteFrame.style.width  = w + "px";
      siteFrame.style.height = h + "px";
      siteFrame.style.transform = `scale(${scale})`;
      zoomDisplay.textContent = pct + "%";
    }

    function setZoom(pct, save = true) {
      zoomSlider.value = pct;
      applyZoom(pct);
      if (save && typeof Office !== "undefined" && Office.context) {
        Office.context.document.settings.set(SETTING_ZOOM, pct);
        Office.context.document.settings.saveAsync();
      }
    }

    // ── Frame loader ───────────────────────────────────────────
    function loadUrl(url) {
      if (!url) return;
      // Ensure scheme is present
      if (!/^https?:\/\//i.test(url)) url = "https://" + url;
      urlInput.value = url;
      siteFrame.src  = url;
      placeholder.style.display = "none";
      // Persist URL
      if (typeof Office !== "undefined" && Office.context) {
        Office.context.document.settings.set(SETTING_URL, url);
        Office.context.document.settings.saveAsync();
      }
    }

    // ── Event listeners ────────────────────────────────────────
    loadBtn.addEventListener("click", () => loadUrl(urlInput.value.trim()));

    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadUrl(urlInput.value.trim());
    });

    zoomSlider.addEventListener("input", () => {
      setZoom(parseInt(zoomSlider.value));
    });

    zoomReset.addEventListener("click", () => setZoom(DEFAULT_ZOOM));

    // Re-apply zoom if wrapper is resized (e.g. window resize)
    new ResizeObserver(() => applyZoom(parseInt(zoomSlider.value)))
      .observe(frameWrapper);

    // ── Office.js init ─────────────────────────────────────────
    Office.onReady(() => {
      const settings = Office.context.document.settings;

      // Restore saved zoom
      const savedZoom = settings.get(SETTING_ZOOM);
      setZoom(savedZoom != null ? savedZoom : DEFAULT_ZOOM, false);

      // Restore saved URL
      const savedUrl = settings.get(SETTING_URL);
      if (savedUrl) loadUrl(savedUrl);
    });
  </script>
</body>
</html>
